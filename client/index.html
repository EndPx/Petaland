<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Petaland — Pixel Farming MMO on Solana</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        background: #f0dcc8;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        font-family: 'Nunito', sans-serif;
      }

      /* Warm pattern background */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background:
          radial-gradient(circle at 20% 30%, rgba(232, 180, 140, 0.4) 0%, transparent 50%),
          radial-gradient(circle at 80% 70%, rgba(200, 160, 130, 0.3) 0%, transparent 50%),
          radial-gradient(circle at 50% 50%, rgba(245, 225, 200, 0.5) 0%, transparent 70%);
        pointer-events: none;
        z-index: 0;
      }

      /* Game container — rounded canvas with warm shadow */
      #game-container {
        position: relative;
        z-index: 1;
        border-radius: 16px;
        overflow: hidden;
        box-shadow:
          0 8px 32px rgba(100, 60, 20, 0.18),
          0 2px 8px rgba(100, 60, 20, 0.1),
          inset 0 0 0 1px rgba(255, 255, 255, 0.3);
      }

      /* Pixel-perfect canvas rendering */
      canvas {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        display: block;
        border-radius: 16px;
      }

      /* HUD overlay sits on top of the Phaser canvas */
      #hud-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 10;
      }

      /* Inventory panel (hidden by default) */
      #inventory-panel {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        pointer-events: all;
        z-index: 20;
        display: none;
      }
    </style>
  </head>
  <body>
    <!-- Phaser mounts its canvas here -->
    <div id="game-container"></div>

    <!-- DOM-based HUD overlay -->
    <div id="hud-overlay"></div>

    <!-- Inventory panel -->
    <div id="inventory-panel"></div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
