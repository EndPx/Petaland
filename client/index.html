<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Petaland — Pixel Farming MMO on Solana</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        background: #1a1a2e;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        font-family: 'Courier New', monospace;
      }

      /* Pixel-perfect canvas rendering */
      canvas {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        display: block;
      }

      /* HUD overlay sits on top of the Phaser canvas */
      #hud-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 10;
      }

      /* Inventory panel (hidden by default) */
      #inventory-panel {
        position: fixed;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        pointer-events: all;
        z-index: 20;
        display: none;
      }
    </style>
  </head>
  <body>
    <!-- Phaser mounts its canvas here -->
    <div id="game-container"></div>

    <!-- DOM-based HUD overlay -->
    <div id="hud-overlay"></div>

    <!-- Inventory panel -->
    <div id="inventory-panel"></div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
